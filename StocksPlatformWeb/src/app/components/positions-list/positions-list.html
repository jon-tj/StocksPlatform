<div class="pl-root">
  <table class="pl-table" [class.pl-blurred]="!authorized">
    <thead>
      <tr>
        <th>Ticker</th>
        <th class="r">Weight</th>
        <th class="r">Return</th>
      </tr>
    </thead>
    <tbody>
      @for (p of positions; track p.symbol) {
        <tr>
          <td><span class="pl-ticker">{{ p.symbol }}</span></td>
          <td class="r pl-muted">{{ p.sharesFraction }}%</td>
          <td class="r" [class.pos]="p.returnPercent > 0" [class.neg]="p.returnPercent < 0">
            {{ p.returnPercent > 0 ? '+' : '' }}{{ p.returnPercent }}%
          </td>
        </tr>
      }
    </tbody>
  </table>

  @if (!authorized) {
    <div class="pl-overlay">
      <div class="pl-overlay-icon">📊</div>
      <strong>Complete this week's poll to unlock</strong>
      <span>Submit your forecasts to reveal your top positions.</span>
      <button class="pl-btn-poll" routerLink="/poll">Take the Poll &rarr;</button>
    </div>
  }
</div>
