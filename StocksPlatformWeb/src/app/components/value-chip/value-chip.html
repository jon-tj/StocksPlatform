@if (displayAmount() !== null) {
  <span class="value-chip" [class.value-chip-converted]="wasConverted()">
    @if (wasConverted()) {
      <span class="value-approx" title="Converted from {{ currency() }}">~</span>
    }
    <span class="value-amount">{{ displayAmount() | number: format() }}</span>
    <span class="value-currency">{{ displayCurrency() }}</span>
  </span>
} @else if (amount() !== null) {
  <!-- Amount provided but rates unavailable: show original with its own currency -->
  <span class="value-chip value-chip-no-rates" title="Exchange rate unavailable">
    <span class="value-amount">{{ amount() | number: format() }}</span>
    <span class="value-currency">{{ currency() }}</span>
  </span>
} @else {
  <span class="value-chip value-chip-empty">—</span>
}
