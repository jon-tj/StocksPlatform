<div class="sc-root">
  <div class="sc-header">
    @if (title) {
      <span class="sc-title">{{ title }}</span>
    }
    <span class="sc-time-range">{{ timeFrom }} – {{ timeTo }}</span>
  </div>

  <div class="sc-legend">
    @for (s of returnsSeries; track $index; let i = $index) {
      <span class="sc-legend-item">
        <span class="sc-legend-dot" [style.background]="getColor(i)"></span>
        @if (s.name) {<span>{{ s.name }}</span>}
        <span
          class="sc-legend-val"
          [class.pos]="getLiveValue(s) >= 0"
          [class.neg]="getLiveValue(s) < 0"
        >{{ getLiveValue(s) >= 0 ? '+' : '' }}{{ getLiveValue(s) | number: '1.1-1' }}%</span>
      </span>
    }
  </div>

  <div class="sc-svg-wrap" #svgWrap (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()">
    <svg [attr.viewBox]="'0 0 ' + W + ' ' + H" class="sc-svg">
      <defs>
        @for (s of returnsSeries; track $index; let i = $index) {
          <linearGradient [id]="gradId(i)" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" [attr.stop-color]="getColor(i)" stop-opacity="0.22" />
            <stop offset="100%" [attr.stop-color]="getColor(i)" stop-opacity="0" />
          </linearGradient>
        }
      </defs>

      @for (s of returnsSeries; track $index; let i = $index) {
        @if (i === 0) {
          <path [attr.d]="getAreaPath(s)" [attr.fill]="'url(#' + gradId(i) + ')'" />
        }
        <path
          [attr.d]="getLinePath(s)"
          fill="none"
          [attr.stroke]="getColor(i)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      }

      @if (hoveredIndex !== null) {
        <line
          [attr.x1]="hoverX" [attr.y1]="padY"
          [attr.x2]="hoverX" [attr.y2]="H - padY"
          stroke="#334155" stroke-width="1" stroke-dasharray="4,3"
        />
        @for (s of returnsSeries; track $index; let i = $index) {
          <circle
            [attr.cx]="hoverX"
            [attr.cy]="getPointY(s, hoveredIndex)"
            r="4"
            [attr.fill]="getColor(i)"
            style="stroke: var(--color-background); stroke-width: 2"
          />
        }
      }
    </svg>
  </div>

  <div class="sc-x-labels">
    @for (t of timeLabels; track t) {
      <span>{{ t }}</span>
    }
  </div>
</div>
