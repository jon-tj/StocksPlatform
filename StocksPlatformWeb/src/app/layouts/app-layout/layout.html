<div class="app-shell">
  <nav>
    <span class="brand" routerLink="/dashboard">StocksPlatform</span>
    <div class="nav-right">
      @if (showLogout) {
        <span class="nav-user">{{ displayName }}</span>
      }
      <button class="btn-theme" (click)="toggleTheme()" [title]="isDark ? 'Switch to day mode' : 'Switch to night mode'">
        <span class="material-icons">{{ isDark ? 'dark_mode' : 'light_mode' }}</span>
      </button>
      @if (showLogout) {
        <button class="btn-ghost" (click)="logout()">Log out</button>
      }
    </div>
  </nav>
  <div class="app-content">
    <router-outlet />
  </div>
</div>
