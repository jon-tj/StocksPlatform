<main>
  <div class="cards-grid">

    <!-- Search -->
    <div class="search-card">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
      </svg>
      <input
        class="search-input"
        type="search"
        placeholder="Search positions…"
        [(ngModel)]="searchQuery"
      />
    </div>

    <!-- Portfolio Returns (always visible) -->
    <section class="card returns-card">
      @if (chartLoading) {
        <div class="chart-loading">Loading…</div>
      } @else {
        <app-stock-chart [priceSeries]="chartSeries" [title]="chartTitle" />
      }
    </section>

    <!-- Top Holdings (gated behind poll) -->
    <section class="card holdings-card">
      <div class="holdings-header">
        <h2>Top Positions</h2>
      </div>
      <app-positions-list [positions]="positions" [authorized]="pollCompleted" [filter]="searchQuery" />
    </section>

  </div>
</main>
